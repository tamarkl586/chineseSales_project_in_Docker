<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <defs>
    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A31532;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B1025;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A843;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8912E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="giftGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C41E3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B1A2B;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00000022"/>
    </filter>
  </defs>
  
  <!-- Gift Box -->
  <g filter="url(#shadow)">
    <!-- Box body -->
    <rect x="12" y="30" width="40" height="32" rx="3" fill="url(#giftGrad)"/>
    <!-- Box lid -->
    <rect x="9" y="24" width="46" height="10" rx="3" fill="url(#ribbonGrad)"/>
    <!-- Vertical ribbon -->
    <rect x="28" y="24" width="8" height="38" rx="1" fill="url(#starGrad)"/>
    <!-- Horizontal ribbon -->
    <rect x="9" y="40" width="46" height="7" rx="1" fill="url(#starGrad)" opacity="0.85"/>
    <!-- Bow left -->
    <ellipse cx="26" cy="20" rx="8" ry="6" fill="url(#starGrad)" transform="rotate(-15 26 20)"/>
    <!-- Bow right -->
    <ellipse cx="38" cy="20" rx="8" ry="6" fill="url(#starGrad)" transform="rotate(15 38 20)"/>
    <!-- Bow center -->
    <circle cx="32" cy="22" r="4" fill="#D4A843"/>
    <!-- Sparkle top-right -->
    <g transform="translate(52, 12)">
      <path d="M4 0 L5 3 L8 4 L5 5 L4 8 L3 5 L0 4 L3 3 Z" fill="#D4A843" opacity="0.9"/>
    </g>
    <!-- Small sparkle -->
    <g transform="translate(6, 16)">
      <path d="M2.5 0 L3.2 1.8 L5 2.5 L3.2 3.2 L2.5 5 L1.8 3.2 L0 2.5 L1.8 1.8 Z" fill="#D4A843" opacity="0.7"/>
    </g>
  </g>
  
  <!-- Hebrew Text: מכירה סינית -->
  <text x="72" y="38" font-family="'Rubik', 'Arial', sans-serif" font-weight="700" font-size="24" fill="#8B1A2B" direction="rtl" text-anchor="start">מכירה סינית</text>
  
  <!-- Subtitle -->
  <text x="72" y="58" font-family="'Rubik', 'Arial', sans-serif" font-weight="400" font-size="13" fill="#B8912E" direction="rtl" text-anchor="start">הגרלת הפרסים הגדולה</text>
  
  <!-- Decorative line -->
  <line x1="72" y1="42" x2="200" y2="42" stroke="#D4A843" stroke-width="1" opacity="0.5"/>
</svg>